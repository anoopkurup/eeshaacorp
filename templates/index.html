<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Campaigns</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: #075e54;
    color: #fff;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  header svg { flex-shrink: 0; }
  header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: .3px; }

  /* ── Layout ── */
  main { max-width: 900px; margin: 28px auto; padding: 0 20px 60px; }

  /* ── Cards ── */
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,.1);
    padding: 22px 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: .75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: #888;
    margin-bottom: 16px;
  }

  /* ── Campaign selector ── */
  .campaign-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  select, input[type="text"] {
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    padding: 9px 14px;
    font-size: .9rem;
    background: #fff;
    color: #1a1a2e;
    outline: none;
    transition: border-color .15s;
  }
  select:focus, input[type="text"]:focus { border-color: #075e54; }
  select { min-width: 200px; cursor: pointer; }

  /* ── New-campaign form ── */
  #new-campaign-form {
    display: none;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid #f0f2f5;
    display: none;
  }
  #new-campaign-form.open { display: block; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .form-grid label { font-size: .8rem; color: #555; margin-bottom: 4px; display: block; }
  .form-grid input { width: 100%; }
  .form-full { grid-column: 1 / -1; }

  /* ── Status stat grid ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
  }
  .stat-tile {
    background: #f8f9fb;
    border-radius: 10px;
    padding: 14px 16px;
    text-align: center;
  }
  .stat-tile .num { font-size: 1.6rem; font-weight: 700; color: #075e54; line-height: 1.1; }
  .stat-tile .lbl { font-size: .72rem; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }

  /* ── Buttons ── */
  .btn-grid { display: flex; flex-wrap: wrap; gap: 10px; }

  button {
    border: none;
    border-radius: 8px;
    padding: 11px 20px;
    font-size: .88rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
  }
  button:active:not(:disabled) { transform: scale(.97); }
  button:disabled { opacity: .4; cursor: not-allowed; }

  .btn-primary { background: #075e54; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #054d45; }
  .btn-warn { background: #f59e0b; color: #fff; }
  .btn-warn:hover:not(:disabled) { background: #d97706; }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-danger:hover:not(:disabled) { background: #dc2626; }
  .btn-ghost { background: #e8f5e9; color: #075e54; }
  .btn-ghost:hover:not(:disabled) { background: #d4edda; }
  .btn-create { background: #6366f1; color: #fff; }
  .btn-create:hover:not(:disabled) { background: #4f46e5; }

  .badge {
    background: rgba(255,255,255,.25);
    border-radius: 20px;
    padding: 1px 7px;
    font-size: .75rem;
    font-weight: 700;
  }
  .btn-ghost .badge { background: rgba(7,94,84,.15); color: #075e54; }

  /* ── Running banner ── */
  #running-banner {
    display: none;
    background: #fff8e1;
    border: 1px solid #f59e0b;
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 16px;
    font-size: .88rem;
    color: #92400e;
    align-items: center;
    gap: 10px;
  }
  #running-banner.show { display: flex; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid #f59e0b;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Output console ── */
  #console-wrap { position: relative; }
  #console-wrap .card-title { display: flex; justify-content: space-between; align-items: center; }
  #clear-btn {
    background: none; border: none; color: #aaa; font-size: .8rem;
    cursor: pointer; padding: 0; font-weight: 500;
  }
  #clear-btn:hover { color: #555; }
  pre#console {
    background: #1e1e2e;
    color: #cdd6f4;
    border-radius: 8px;
    padding: 16px;
    min-height: 120px;
    max-height: 420px;
    overflow-y: auto;
    font-size: .8rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  pre#console:empty::after { content: "Output will appear here…"; color: #6c7086; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 10px 20px; border-radius: 8px;
    font-size: .85rem; opacity: 0; transition: opacity .3s;
    pointer-events: none; z-index: 99;
  }
  #toast.show { opacity: 1; }

  /* ── No campaign placeholder ── */
  #no-campaign { color: #aaa; font-size: .9rem; padding: 10px 0; }
</style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
    <path d="M20.52 3.48A11.93 11.93 0 0012 0C5.37 0 0 5.37 0 12c0 2.12.55 4.18 1.6 6L0 24l6.18-1.58A11.94 11.94 0 0012 24c6.63 0 12-5.37 12-12 0-3.21-1.25-6.22-3.48-8.52z" fill="#fff"/>
    <path d="M17.47 14.38c-.3-.15-1.77-.87-2.04-.97-.27-.1-.47-.15-.67.15s-.77.97-.94 1.17c-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.48-.89-.79-1.49-1.77-1.66-2.07-.18-.3-.02-.46.13-.61.14-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.08-.15-.67-1.61-.92-2.2-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.79.37-.27.3-1.03 1-1.03 2.46s1.06 2.85 1.2 3.05c.15.2 2.08 3.18 5.04 4.46.7.3 1.25.48 1.68.61.7.22 1.34.19 1.84.12.56-.08 1.73-.7 1.97-1.38.24-.68.24-1.26.17-1.38-.07-.12-.27-.2-.57-.35z" fill="#075e54"/>
  </svg>
  <h1>WhatsApp Campaigns</h1>
</header>

<main>

  <!-- Campaign selector -->
  <div class="card">
    <div class="card-title">Campaign</div>
    <div class="campaign-row">
      <select id="campaign-select">
        <option value="">— select campaign —</option>
        {% for c in campaigns %}
        <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
        <option value="__new__">+ New Campaign</option>
      </select>
      <button class="btn-ghost" id="refresh-btn" title="Refresh status">
        ↻ Refresh
      </button>
    </div>

    <!-- New campaign form -->
    <div id="new-campaign-form">
      <div class="form-grid">
        <div class="form-full">
          <label>Campaign name *</label>
          <input type="text" id="nc-name" placeholder="e.g. april_invoices">
        </div>
        <div>
          <label>Contacts CSV path (optional)</label>
          <input type="text" id="nc-contacts" placeholder="/path/to/contacts.csv">
        </div>
        <div>
          <label>Message template path (optional)</label>
          <input type="text" id="nc-message" placeholder="/path/to/message.md">
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:4px">
        <button class="btn-create" id="create-submit-btn">Create Campaign</button>
        <button class="btn-ghost" id="create-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Status stats -->
  <div class="card" id="stats-card" style="display:none">
    <div class="card-title">Status</div>
    <div class="stat-grid" id="stat-grid"></div>
  </div>

  <!-- Commands -->
  <div class="card" id="commands-card" style="display:none">
    <div class="card-title">Commands</div>
    <div id="running-banner">
      <span class="spinner"></span>
      <span id="running-label">Running…</span>
      <button class="btn-danger" id="stop-btn" style="margin-left:auto; padding:6px 14px; font-size:.8rem;">
        🛑 Stop
      </button>
    </div>
    <div class="btn-grid">
      <button class="btn-primary" data-cmd="send">
        📤 Send Initial
        <span class="badge" id="badge-send">0</span>
      </button>
      <button class="btn-ghost" data-cmd="followup">
        💬 Follow-up 1
        <span class="badge" id="badge-followup">0</span>
      </button>
      <button class="btn-ghost" data-cmd="followup2">
        💬 Follow-up 2
        <span class="badge" id="badge-followup2">0</span>
      </button>
      <button class="btn-ghost" data-cmd="followup3">
        💬 Follow-up 3
        <span class="badge" id="badge-followup3">0</span>
      </button>
      <button class="btn-warn" data-cmd="remind">
        🔔 Reminder
        <span class="badge" id="badge-remind">0</span>
      </button>
      <button class="btn-create" data-cmd="askrefer">
        🙋 Ask to Refer
        <span class="badge" id="badge-askrefer">0</span>
      </button>
      <button class="btn-create" data-cmd="referral">
        🔗 Send Referral
        <span class="badge" id="badge-referral">0</span>
      </button>
    </div>
    <p style="font-size:.75rem;color:#aaa;margin-top:12px">
      Badge = eligible contacts. Buttons disabled when count is 0 or a command is running.
    </p>
  </div>

  <!-- Output console -->
  <div class="card" id="console-card" style="display:none">
    <div class="card-title">
      Output
      <button id="clear-btn">clear</button>
    </div>
    <pre id="console"></pre>
  </div>

  <div id="no-campaign">Select or create a campaign to get started.</div>

</main>

<div id="toast"></div>

<script>
  const campaignSelect = document.getElementById('campaign-select');
  const newForm = document.getElementById('new-campaign-form');
  const statGrid = document.getElementById('stat-grid');
  const statsCard = document.getElementById('stats-card');
  const commandsCard = document.getElementById('commands-card');
  const consoleCard = document.getElementById('console-card');
  const consoleEl = document.getElementById('console');
  const noCampaign = document.getElementById('no-campaign');
  const runningBanner = document.getElementById('running-banner');
  const runningLabel = document.getElementById('running-label');

  let currentCampaign = null;
  let currentES = null;
  let currentJobId = null;
  let statusInterval = null;

  // ── Toast ──────────────────────────────────────────────────────────────────
  function showToast(msg, duration = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  // ── Stats ──────────────────────────────────────────────────────────────────
  function renderStats(stats) {
    const tiles = [
      { key: 'total',             label: 'Total' },
      { key: 'sent',              label: 'Sent' },
      { key: 'failed',            label: 'Failed' },
      { key: 'pending',           label: 'Pending' },
      { key: 'responded',         label: 'Responded' },
      { key: 'interested',        label: 'Interested' },
      { key: 'not_interested',    label: 'Not Interested' },
      { key: 'paid',              label: 'Paid' },
      { key: 'followup_done',     label: 'Follow-up 1' },
      { key: 'followup2_done',    label: 'Follow-up 2' },
      { key: 'followup3_done',    label: 'Follow-up 3' },
      { key: 'reminder_done',     label: 'Reminders' },
      { key: 'ask_to_refer_done', label: 'Ask to Refer' },
      { key: 'referrers',         label: 'Referrers' },
      { key: 'referral_done',     label: 'Referrals Sent' },
    ];
    statGrid.innerHTML = tiles.map(t =>
      `<div class="stat-tile">
        <div class="num">${stats[t.key] ?? 0}</div>
        <div class="lbl">${t.label}</div>
      </div>`
    ).join('');
  }

  // ── Button states ──────────────────────────────────────────────────────────
  function applyButtonStates(counts, isRunning) {
    document.querySelectorAll('[data-cmd]').forEach(btn => {
      const cmd = btn.dataset.cmd;
      const count = counts[cmd] ?? 0;
      document.getElementById('badge-' + cmd).textContent = count;
      btn.disabled = isRunning || count === 0;
      btn.title = `${count} eligible contact${count !== 1 ? 's' : ''}`;
    });
  }

  // ── Refresh status ─────────────────────────────────────────────────────────
  async function refreshStatus(campaign) {
    if (!campaign) return;
    try {
      const res = await fetch(`/api/status/${encodeURIComponent(campaign)}`);
      if (!res.ok) return;
      const data = await res.json();
      renderStats(data.stats);
      applyButtonStates(data.button_counts, data.is_running);
      if (data.is_running) {
        runningBanner.classList.add('show');
        runningLabel.textContent = `Running: ${data.running_cmd}…`;
      } else {
        runningBanner.classList.remove('show');
      }
    } catch (e) { /* network error — ignore */ }
  }

  // ── Select campaign ────────────────────────────────────────────────────────
  campaignSelect.addEventListener('change', () => {
    const val = campaignSelect.value;
    if (val === '__new__') {
      newForm.classList.add('open');
      campaignSelect.value = currentCampaign || '';
      return;
    }
    currentCampaign = val || null;
    newForm.classList.remove('open');

    if (currentCampaign) {
      statsCard.style.display = '';
      commandsCard.style.display = '';
      consoleCard.style.display = '';
      noCampaign.style.display = 'none';
      consoleEl.textContent = '';
      refreshStatus(currentCampaign);
      clearInterval(statusInterval);
      statusInterval = setInterval(() => refreshStatus(currentCampaign), 30000);
    } else {
      statsCard.style.display = 'none';
      commandsCard.style.display = 'none';
      consoleCard.style.display = 'none';
      noCampaign.style.display = '';
    }
  });

  document.getElementById('refresh-btn').addEventListener('click', () => {
    refreshStatus(currentCampaign);
  });

  // ── New campaign form ──────────────────────────────────────────────────────
  document.getElementById('create-cancel-btn').addEventListener('click', () => {
    newForm.classList.remove('open');
  });

  document.getElementById('create-submit-btn').addEventListener('click', async () => {
    const name = document.getElementById('nc-name').value.trim();
    if (!name) { showToast('Campaign name is required'); return; }
    const contactsPath = document.getElementById('nc-contacts').value.trim() || null;
    const messagePath  = document.getElementById('nc-message').value.trim() || null;

    try {
      const res = await fetch('/api/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ campaign_name: name, contacts_path: contactsPath, message_path: messagePath }),
      });
      const data = await res.json();
      if (!res.ok) { showToast('Error: ' + (data.error || res.statusText)); return; }

      // Add to select and switch to it
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      const newOpt = campaignSelect.querySelector('option[value="__new__"]');
      campaignSelect.insertBefore(opt, newOpt);
      campaignSelect.value = name;
      campaignSelect.dispatchEvent(new Event('change'));

      newForm.classList.remove('open');
      document.getElementById('nc-name').value = '';
      document.getElementById('nc-contacts').value = '';
      document.getElementById('nc-message').value = '';
      showToast(`Campaign "${name}" created`);

      // Show output
      consoleEl.textContent = data.output || '';
    } catch (e) {
      showToast('Network error');
    }
  });

  // ── Run command ────────────────────────────────────────────────────────────
  document.querySelectorAll('[data-cmd]').forEach(btn => {
    btn.addEventListener('click', () => runCommand(btn.dataset.cmd));
  });

  async function runCommand(cmd) {
    if (!currentCampaign) return;

    // Disable all buttons immediately
    document.querySelectorAll('[data-cmd]').forEach(b => b.disabled = true);
    runningBanner.classList.add('show');
    runningLabel.textContent = `Running: ${cmd}…`;
    consoleEl.textContent = '';

    try {
      const res = await fetch(`/api/run/${encodeURIComponent(currentCampaign)}/${cmd}`, { method: 'POST' });
      const data = await res.json();
      if (!res.ok) {
        showToast(data.error || 'Failed to start command');
        runningBanner.classList.remove('show');
        refreshStatus(currentCampaign);
        return;
      }
      currentJobId = data.job_id;
      openStream(data.job_id);
    } catch (e) {
      showToast('Network error');
      runningBanner.classList.remove('show');
      refreshStatus(currentCampaign);
    }
  }

  // ── Stop (cancel) ──────────────────────────────────────────────────────────
  document.getElementById('stop-btn').addEventListener('click', async () => {
    if (!currentJobId) return;
    const stopBtn = document.getElementById('stop-btn');
    stopBtn.disabled = true;
    stopBtn.textContent = 'Stopping…';
    try {
      const res = await fetch(`/api/cancel/${encodeURIComponent(currentJobId)}`, { method: 'POST' });
      const data = await res.json();
      showToast(data.message || data.error || 'Cancel sent');
    } catch (e) {
      showToast('Network error');
      stopBtn.disabled = false;
      stopBtn.innerHTML = '🛑 Stop';
    }
  });

  // ── SSE stream ─────────────────────────────────────────────────────────────
  function openStream(jobId) {
    if (currentES) { currentES.close(); }
    currentES = new EventSource(`/api/stream/${jobId}`);

    currentES.onmessage = (e) => {
      if (e.data === '__DONE__') {
        currentES.close();
        currentES = null;
        currentJobId = null;
        runningBanner.classList.remove('show');
        resetStopButton();
        refreshStatus(currentCampaign);
        return;
      }
      consoleEl.textContent += e.data + '\n';
      consoleEl.scrollTop = consoleEl.scrollHeight;
    };

    currentES.onerror = () => {
      currentES.close();
      currentES = null;
      currentJobId = null;
      runningBanner.classList.remove('show');
      resetStopButton();
      refreshStatus(currentCampaign);
    };
  }

  function resetStopButton() {
    const stopBtn = document.getElementById('stop-btn');
    stopBtn.disabled = false;
    stopBtn.innerHTML = '🛑 Stop';
  }

  // ── Clear console ──────────────────────────────────────────────────────────
  document.getElementById('clear-btn').addEventListener('click', () => {
    consoleEl.textContent = '';
  });
</script>
</body>
</html>
